<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand-On — Binnenkort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E8753A;
      --coral:  #F27268;
      --grad: linear-gradient(120deg, var(--orange), var(--coral));
      --white: #FFFFFF;
      --off:   #FDF8F6;
      --ink:   #1C0E08;
      --muted: #9E8880;
    }

    body {
      background: var(--off);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Large background ring */
    .bg-ring {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      border: 1.5px solid rgba(232, 117, 58, 0.12);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: rotate-ring 40s linear infinite;
    }
    .bg-ring::before {
      content: '';
      position: absolute;
      inset: 60px;
      border-radius: 50%;
      border: 1px solid rgba(242, 114, 104, 0.08);
    }
    @keyframes rotate-ring {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Soft blob */
    .blob {
      position: fixed;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(232,117,58,0.09) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* Top progress bar */
    .topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: rgba(0,0,0,0.04);
      z-index: 50;
    }
    .topbar-fill {
      height: 100%;
      background: var(--grad);
      width: 0;
      animation: fill-bar 2.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.3s;
    }
    @keyframes fill-bar {
      to { width: 72%; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: var(--white);
      border-radius: 20px;
      padding: 56px 60px 48px;
      max-width: 560px;
      width: 100%;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 32px rgba(232,117,58,0.08),
        0 24px 64px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    /* Logo */
    .logo {
      opacity: 0;
      transform: translateY(-12px);
      animation: up 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
      animation-delay: 0.2s;
      margin-bottom: 40px;
      align-self: center;
    }
    .logo img {
      height: 48px;
      width: auto;
      display: block;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(232,117,58,0.3), rgba(242,114,104,0.1), transparent);
      margin-bottom: 36px;
      opacity: 0;
      animation: fade 0.6s ease forwards;
      animation-delay: 0.55s;
    }

    /* Status pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(232,117,58,0.08);
      border: 1px solid rgba(232,117,58,0.18);
      border-radius: 100px;
      padding: 5px 14px 5px 10px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fade 0.6s ease forwards;
      animation-delay: 0.65s;
    }
    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--grad);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(0.6); opacity: 0.5; }
    }
    .pill span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--orange);
      text-transform: uppercase;
    }

    /* Headline */
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(1.75rem, 4vw, 2.4rem);
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 18px;
      opacity: 0;
      transform: translateY(16px);
      animation: up 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
      animation-delay: 0.75s;
    }
    h1 .grad-text {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Body text */
    .body-text {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 40px;
      opacity: 0;
      animation: fade 0.7s ease forwards;
      animation-delay: 0.95s;
    }

    /* Bottom row */
    .bottom-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      opacity: 0;
      animation: up 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
      animation-delay: 1.1s;
    }

    .comeback {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    /* Animated progress dots */
    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .dots span {
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .dots span:nth-child(1) { background: var(--orange); animation: bounce-dot 1.4s ease-in-out infinite; animation-delay: 0s; }
    .dots span:nth-child(2) { background: color-mix(in srgb, var(--orange) 60%, var(--coral)); animation: bounce-dot 1.4s ease-in-out infinite; animation-delay: 0.2s; }
    .dots span:nth-child(3) { background: var(--coral); animation: bounce-dot 1.4s ease-in-out infinite; animation-delay: 0.4s; }

    @keyframes bounce-dot {
      0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
      40%            { transform: scale(1.35); opacity: 1; }
    }

    /* Shared */
    @keyframes up   { to { opacity: 1; transform: translateY(0); } }
    @keyframes fade { to { opacity: 1; } }

    /* Footer outside card */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fade 0.8s ease forwards;
      animation-delay: 1.4s;
      z-index: 10;
    }

    @media (max-width: 520px) {
      .card { padding: 40px 28px 36px; }
      .bottom-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="topbar"><div class="topbar-fill"></div></div>
  <div class="bg-ring"></div>
  <div class="blob"></div>

  <div class="card">
    <div class="logo">
      <img src="logo.png" alt="Brand-On" />
    </div>

    <div class="divider"></div>

    <div class="pill">
      <div class="pill-dot"></div>
      <span>In ontwikkeling</span>
    </div>

    <h1>We zijn momenteel bezig met het <span class="grad-text">bouwen</span> van deze website.</h1>

    <p class="body-text">
      Er wordt hard gewerkt aan iets moois.<br />
      We zijn er bijna — bedankt voor je geduld.
    </p>

    <div class="bottom-row">
      <span class="comeback">Kom snel terug.</span>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <p class="footer">&copy; 2026 Brand-On &nbsp;&middot;&nbsp; Alle rechten voorbehouden</p>

</body>
</html>
